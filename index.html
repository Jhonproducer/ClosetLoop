<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rotación de Ropa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🔄 RotaRopa</h1>
            <p id="estado-cesto" class="alerta-cesto">Cesto vacío</p>
        </header>

        <section class="panel-principal">
            <h2>👕 Tienes puesto ahora:</h2>
            <div class="outfit-display" id="outfit-actual">
                </div>
            
            <div class="acciones-ducha">
                <button onclick="meVoyABanar(false)" class="btn-ducha">🚿 Me voy a bañar (Cambiar todo)</button>
                <button onclick="meVoyABanar(true)" class="btn-reciclar">♻️ El short aguanta (Cambiar solo franela)</button>
            </div>
        </section>

        <section class="panel-sugerencia">
            <h2>🔜 Próxima muda (La menos usada):</h2>
            <div class="outfit-display" id="outfit-sugerido">
                </div>
        </section>

        <section class="panel-inventario">
            <div class="tabs">
                <button onclick="verPestana('limpio')" id="tab-limpio" class="active">✨ Limpios</button>
                <button onclick="verPestana('sucio')" id="tab-sucio">🧺 Cesto</button>
            </div>
            <div id="lista-ropa" class="grid-ropa"></div>
        </section>

        <button class="fab" onclick="abrirModal()">+</button>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <h3>Añadir Prenda</h3>
                <input type="text" id="nombre-prenda" placeholder="Ej: Franela Azul" maxlength="25">
                <select id="tipo-prenda">
                    <option value="superior">Franela</option>
                    <option value="inferior">Short / Pantalón</option>
                </select>
                <input type="file" id="foto-prenda" accept="image/*" capture="camera">
                <button onclick="guardarPrenda()" class="btn-guardar">Guardar</button>
                <button onclick="cerrarModal()" class="btn-cerrar">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
