<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Closet Rotativo Inteligente</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1{margin-top:20px;}

.container{
  width:90%;
  max-width:600px;
  margin:auto;
}

input, select{
  padding:8px;
  margin:5px;
}

button{
  padding:10px 15px;
  margin:5px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

.card{
  background:#1e293b;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

img{
  width:80px;
  border-radius:6px;
}
.alert{
  background:#dc2626;
  padding:10px;
  border-radius:8px;
  margin:10px 0;
}
.warning{
  background:#f59e0b;
  padding:10px;
  border-radius:8px;
  margin:10px 0;
}
</style>
</head>
<body>

<div class="container">

<h1>Closet Inteligente</h1>

<h2>Agregar Prenda</h2>

<input type="text" id="nombre" placeholder="Nombre">
<select id="categoria">
  <option value="franela">Franela</option>
  <option value="short">Short</option>
  <option value="pantalon">Pantalón</option>
</select>
<input type="file" id="imagen" accept="image/*">
<br>
<button onclick="agregarPrenda()">Agregar Prenda</button>

<h2>Outfit Recomendado</h2>
<div id="alerta"></div>
<div id="outfit"></div>
<button onclick="generarOutfit()">¿Qué me pongo hoy?</button>

<h2>Acciones</h2>
<button onclick="terminarUso()">Terminé de usar</button>
<button onclick="lavar()">Ya Lavé 🧺</button>

<h2>Estado General</h2>
<div id="estado"></div>

</div>

<script>

let prendas = JSON.parse(localStorage.getItem("prendas")) || [];

function guardar(){
  localStorage.setItem("prendas", JSON.stringify(prendas));
}

function agregarPrenda(){
  const nombre = document.getElementById("nombre").value;
  const categoria = document.getElementById("categoria").value;
  const file = document.getElementById("imagen").files[0];

  if(!nombre || !file){
    alert("Completa nombre e imagen");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    prendas.push({
      nombre,
      categoria,
      imagen: e.target.result,
      estado:"limpia",
      usos:0,
      ultimaVez:null
    });

    guardar();
    alert("Prenda agregada");
    actualizarEstado();
  };

  reader.readAsDataURL(file);
}

function generarOutfit(){
  const limpias = prendas.filter(p=>p.estado==="limpia");

  const superiores = limpias.filter(p=>p.categoria==="franela")
    .sort((a,b)=>a.usos-b.usos);

  const inferiores = limpias.filter(p=>p.categoria!=="franela")
    .sort((a,b)=>a.usos-b.usos);

  if(superiores.length===0 || inferiores.length===0){
    document.getElementById("outfit").innerHTML="";
    document.getElementById("alerta").innerHTML=
      "<div class='alert'>⚠️ No hay outfit completo. Debes lavar.</div>";
    return;
  }

  if(superiores.length===1 || inferiores.length===1){
    document.getElementById("alerta").innerHTML=
      "<div class='warning'>⚠️ Te queda solo 1 outfit disponible.</div>";
  } else {
    document.getElementById("alerta").innerHTML="";
  }

  const arriba = superiores[0];
  const abajo = inferiores[0];

  arriba.estado="usando";
  abajo.estado="usando";

  document.getElementById("outfit").innerHTML=
    `<div class='card'>
      <p>${arriba.nombre}</p>
      <img src="${arriba.imagen}">
      <p>${abajo.nombre}</p>
      <img src="${abajo.imagen}">
    </div>`;

  guardar();
  actualizarEstado();
}

function terminarUso(){
  prendas.forEach(p=>{
    if(p.estado==="usando"){
      p.estado="cesto";
      p.usos++;
      p.ultimaVez=new Date();
    }
  });

  guardar();
  actualizarEstado();
  alert("Outfit enviado al cesto");
}

function lavar(){
  prendas.forEach(p=>{
    if(p.estado==="cesto"){
      p.estado="limpia";
    }
  });

  guardar();
  actualizarEstado();
  alert("Ciclo reiniciado");
}

function actualizarEstado(){
  const limpias=prendas.filter(p=>p.estado==="limpia").length;
  const usando=prendas.filter(p=>p.estado==="usando").length;
  const cesto=prendas.filter(p=>p.estado==="cesto").length;

  document.getElementById("estado").innerHTML=
    `Limpias: ${limpias}<br>
     En uso: ${usando}<br>
     En cesto: ${cesto}`;
}

actualizarEstado();

</script>

</body>
</html>
