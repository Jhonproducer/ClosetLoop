<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RotaRopa</title>

<style>
body{
  background:#0d1117;
  font-family:Arial;
  color:white;
  text-align:center;
}

.container{
  max-width:700px;
  margin:auto;
}

h1{
  margin-top:20px;
}

.section{
  background:#161b22;
  padding:20px;
  margin:20px 0;
  border-radius:15px;
}

input, select{
  padding:8px;
  margin:5px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.green{
  background:#22c55e;
  color:white;
}

.red{
  background:#dc2626;
  color:white;
}

.blue{
  background:#3b82f6;
  color:white;
}

.card{
  background:#1f2937;
  padding:10px;
  margin:10px;
  border-radius:10px;
  display:inline-block;
}

img{
  width:100px;
  border-radius:8px;
}
</style>
</head>
<body>

<div class="container">

<h1>🔄 RotaRopa</h1>

<div class="section">
<h2>Agregar Prenda</h2>

<input type="text" id="nombre" placeholder="Nombre de la prenda">
<select id="categoria">
<option value="franela">Franela</option>
<option value="short">Short</option>
<option value="pantalon">Pantalón</option>
</select>
<input type="file" id="imagen" accept="image/*">
<br>
<button class="blue" onclick="agregarPrenda()">Agregar</button>
</div>

<div class="section">
<h2>Closet</h2>
<div id="listaPrendas"></div>
</div>

<div class="section">
<h2>Outfit Actual</h2>
<div id="outfitActual">Nada puesto</div>
<button class="green" onclick="generarOutfit()">Generar Outfit</button>
<button class="red" onclick="terminarUso()">Enviar al Cesto</button>
<button class="blue" onclick="lavar()">Ya Lavé</button>
</div>

<div class="section">
<h2>Estado</h2>
<div id="estado"></div>
</div>

</div>

<script>

let prendas = JSON.parse(localStorage.getItem("prendas")) || [];

function guardar(){
localStorage.setItem("prendas", JSON.stringify(prendas));
}

function agregarPrenda(){
const nombre = document.getElementById("nombre").value;
const categoria = document.getElementById("categoria").value;
const file = document.getElementById("imagen").files[0];

if(!nombre || !file){
alert("Falta nombre o imagen");
return;
}

const reader = new FileReader();
reader.onload = function(e){

prendas.push({
nombre:nombre,
categoria:categoria,
imagen:e.target.result,
estado:"limpia",
usos:0
});

guardar();
mostrarPrendas();
actualizarEstado();
alert("Prenda agregada correctamente");

};

reader.readAsDataURL(file);
}

function mostrarPrendas(){
let html="";
prendas.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.imagen}">
<p>${p.nombre}</p>
<p>${p.categoria}</p>
<p>Estado: ${p.estado}</p>
<p>Usos: ${p.usos}</p>
</div>
`;
});
document.getElementById("listaPrendas").innerHTML=html;
}

function generarOutfit(){

const limpias = prendas.filter(p=>p.estado==="limpia");

const arriba = limpias
.filter(p=>p.categoria==="franela")
.sort((a,b)=>a.usos-b.usos)[0];

const abajo = limpias
.filter(p=>p.categoria!=="franela")
.sort((a,b)=>a.usos-b.usos)[0];

if(!arriba || !abajo){
document.getElementById("outfitActual").innerHTML="⚠️ No hay outfit completo. Debes lavar.";
return;
}

arriba.estado="usando";
abajo.estado="usando";

guardar();
mostrarPrendas();
actualizarEstado();

document.getElementById("outfitActual").innerHTML=`
<div class="card">
<img src="${arriba.imagen}">
<p>${arriba.nombre}</p>
</div>
<div class="card">
<img src="${abajo.imagen}">
<p>${abajo.nombre}</p>
</div>
`;

}

function terminarUso(){

prendas.forEach(p=>{
if(p.estado==="usando"){
p.estado="cesto";
p.usos++;
}
});

guardar();
mostrarPrendas();
actualizarEstado();

document.getElementById("outfitActual").innerHTML="Nada puesto";

}

function lavar(){

prendas.forEach(p=>{
if(p.estado==="cesto"){
p.estado="limpia";
}
});

guardar();
mostrarPrendas();
actualizarEstado();

alert("Ciclo reiniciado");

}

function actualizarEstado(){

const limpias=prendas.filter(p=>p.estado==="limpia").length;
const usando=prendas.filter(p=>p.estado==="usando").length;
const cesto=prendas.filter(p=>p.estado==="cesto").length;

document.getElementById("estado").innerHTML=
`
Limpias: ${limpias}<br>
Usando: ${usando}<br>
En Cesto: ${cesto}
`;

}

mostrarPrendas();
actualizarEstado();

</script>

</body>
</html>
